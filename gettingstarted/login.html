<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta http-equiv="X-UA-Compatible" content="IE=edge" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Document</title>
  <style>
    .all {
      width: 800px;
      box-shadow: -10px 10px 25px rgba(210, 210, 210, 0.9);
      margin: auto;
      margin-top: 5%;
      display: flex;
      border-radius: 35px;
      background-color: #ffffff;
      height: 550px;
    }

    .log {
      width: 50%;
      margin: auto;
    }

    .reg {
      width: 50%;
      height: 100%;
      margin: auto;
      background-color: #20b2aa;
      border-radius: 35px;
      color: #ffffff;
    }

    .reg_1 {
      text-align: center;
      margin: auto;
      margin-top: 50%;
    }

    .reg_1 h2 {
      font-weight: 700;
    }

    .reg_1 p {
      margin: 15px 0px 25px 0px;
    }

    .sig {
      width: 70px;
      height: 30px;
      border-radius: 12px;
      background-color: #20b2aa;
      border-color: #fff;
      color: #ffffff;
    }

    #tiao {
      padding: 0em 0;
    }

    .reg_1 a {
      color: #ffffff;
    }

    h3 {
      font-size: 3em;
      color: black;
      padding-bottom: 1em;
      margin: 0;
      text-align: center;
      font-family: "Marvel-Regular";
    }

    .input {
      margin: 10px 50px;
      width: 300px;
      height: 70px;
    }

    span {
      color: #999;
      font-size: 0.85em;
      padding-bottom: 0.2em;
      display: block;
      text-transform: uppercase;
      margin-bottom: 4px;
    }

    .input-text {
      border: 1px solid #555;
      outline-color: #fd9f3e;
      width: 90%;
      font-size: 1em;
      padding: 0.5em;
      line-height: inherit;
    }

    .register-top-grid {
      color: black;
      padding-bottom: 1em;
      margin: 0;
      font-family: "Marvel-Regular";
      margin: 10px 0;
    }

    .text-center {
      text-align: center;
    }

    .tijiao {
      color: rgb(255, 253, 253);
      width: 80px;
      height: 35px;
      background-color: rgb(241, 52, 10);
      border: none;
    }
  </style>
</head>

<body>
  <div class="all">
    <div class="log">
      <div class="register">
        <form id="loginForm">
          <div class="register-top-grid">
            <h3>用户登录</h3>
            <div class="input">
              <span>用户名 <label style="color: red">* </label></span>
              <input type="text" id="username" placeholder="请输入用户名" class="input-text" />
            </div>
            <div class="input">
              <span>密码 <label style="color: red">*</label></span>
              <input type="password" id="password" placeholder="请输入密码" class="input-text" />
            </div>
          </div>
          <div class="text-center">
            <input type="submit" value="提交" class="tijiao" />
          </div>
        </form>
      </div>
    </div>
    <div class="reg">
      <div class="reg_1">
        <h2>没有账号？</h2>
        <p>立即注册加入我们吧，和我们一起开启旅程吧</p>
        <a href="./register.html">
          <button type="primary" class="sig">注册</button>
        </a>
      </div>
    </div>
  </div>

  <script>
    document.getElementById('loginForm').addEventListener('submit', function (e) {
      e.preventDefault();

      // 获取用户名和密码
      const username = document.getElementById('username').value;
      const password = document.getElementById('password').value;

      // 简单验证
      if (!username || !password) {
        alert('请填写用户名和密码');
        return;
      }

      // 获取现有的用户数据
      let users = localStorage.getItem('users');
      if (users) {
        users = JSON.parse(users);
      } else {
        users = [];
      }

      // 查找匹配的用户
      const user = users.find(u => u.username === username && u.password === password);

      if (user) {
        alert('登录成功！');
        window.location.href = "./index.html";
      } else if (username === "szu" && password === "shenzhendaxue") {
        console.log("登录成功");
        alert("登录成功");
        // 在这里可以添加登录成功后的处理逻辑，比如跳转页面、存储用户信息等
        window.location.href = "./index.html";
      } else {
        alert('用户名或密码错误，请重新输入');
      }
    });
  </script>
</body>

</html>
